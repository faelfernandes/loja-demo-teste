services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_DATABASE:-lojademo_db}
      MYSQL_USER: ${DB_USERNAME:-lojademo_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-lojademo_pass}
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - lojademo_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  lojademo-service:
    build:
      context: ./projects/lojademo-service
      dockerfile: Dockerfile
    restart: unless-stopped
    working_dir: /var/www
    ports:
      - "8081:8081"
    volumes:
      - ./projects/lojademo-service:/var/www
    command:
      [
        "sh",
        "-c",
        "composer install --no-scripts --no-autoloader --no-interaction --prefer-dist && composer dump-autoload --optimize && php artisan serve --host=0.0.0.0 --port=8081 && wait",
      ]
    env_file:
      - ./projects/lojademo-service/.env
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-lojademo_db}
      DB_USERNAME: ${DB_USERNAME:-lojademo_user}
      DB_PASSWORD: ${DB_PASSWORD:-lojademo_pass}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - lojademo_network

  lojademo-react:
    build:
      context: ./projects/lojademo-react
      dockerfile: Dockerfile
    restart: unless-stopped
    working_dir: /app
    command: [
      "sh",
      "-c",
      "npm install && npm run dev -- --host 0.0.0.0 --port 5173",
    ]
    ports:
      - "3000:5173"
    env_file:
      - ./projects/lojademo-react/.env
    volumes:
      - ./projects/lojademo-react:/app
    environment:
      REACT_APP_API_URL: http://localhost:8081
    depends_on:
      - lojademo-service
    networks:
      - lojademo_network

volumes:
  dbdata:
    driver: local

networks:
  lojademo_network:
    driver: bridge
