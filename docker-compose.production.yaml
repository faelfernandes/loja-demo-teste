services:
  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  lojademo-service:
    build:
      context: ./projects/lojademo-service
      dockerfile: Dockerfile.production
    restart: always
    working_dir: /var/www
    ports:
      - "8081:8081"
    environment:
      APP_ENV: production
      APP_DEBUG: false
      APP_KEY: ${APP_KEY}
      APP_URL: https://api-lojademo.rfsolucoes.com.br
      SANCTUM_STATEFUL_DOMAINS: lojademo.rfsolucoes.com.br,api-lojademo.rfsolucoes.com.br
      CORS_ALLOWED_ORIGINS: https://lojademo.rfsolucoes.com.br
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - service_storage:/var/www/storage
    command:
      - sh
      - -c
      - |
        mkdir -p storage/framework/{sessions,views,cache} storage/logs &&
        php artisan migrate --force --no-interaction &&
        php artisan config:cache &&
        php artisan route:cache &&
        php artisan view:cache &&
        exec php artisan serve --host=0.0.0.0 --port=8081
    healthcheck:
      test: ["CMD", "curl", "-f", "-s", "--connect-timeout", "5", "http://127.0.0.1:8081/up"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - default
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.lojademo-api.rule=Host(`api-lojademo.rfsolucoes.com.br`)"
      - "traefik.http.routers.lojademo-api.entrypoints=websecure"
      - "traefik.http.routers.lojademo-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.lojademo-api.loadbalancer.server.port=8081"
      - "traefik.http.routers.lojademo-api-http.rule=Host(`api-lojademo.rfsolucoes.com.br`)"
      - "traefik.http.routers.lojademo-api-http.entrypoints=web"
      - "traefik.http.routers.lojademo-api-http.middlewares=redirect-https"
      - "traefik.http.middlewares.redirect-https.redirectscheme.scheme=https"

  lojademo-react:
    build:
      context: ./projects/lojademo-react
      dockerfile: Dockerfile.production
      args:
        VITE_API_BASE_URL: https://api-lojademo.rfsolucoes.com.br/api
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      lojademo-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000', r => { r.resume(); process.exit(r.statusCode === 200 ? 0 : 1); }).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - default
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.lojademo.rule=Host(`lojademo.rfsolucoes.com.br`)"
      - "traefik.http.routers.lojademo.entrypoints=websecure"
      - "traefik.http.routers.lojademo.tls.certresolver=letsencrypt"
      - "traefik.http.services.lojademo.loadbalancer.server.port=3000"
      - "traefik.http.routers.lojademo-http.rule=Host(`lojademo.rfsolucoes.com.br`)"
      - "traefik.http.routers.lojademo-http.entrypoints=web"
      - "traefik.http.routers.lojademo-http.middlewares=redirect-https"

networks:
  coolify:
    external: true

volumes:
  mysql_data:
  service_storage:
