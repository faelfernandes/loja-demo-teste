services:
  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 5

  lojademo-service:
    build:
      context: ./projects/lojademo-service
      dockerfile: Dockerfile
    restart: always
    working_dir: /var/www
    ports:
      - "8081:8081"
    command: ["php", "artisan", "serve", "--host=0.0.0.0", "--port=8081"]
    environment:
      APP_ENV: production
      APP_DEBUG: false
      APP_URL: https://api-lojademo.rfconsultoria.com.br
      SANCTUM_STATEFUL_DOMAINS: lojademo.rfconsultoria.com.br,api-lojademo.rfconsultoria.com.br
    depends_on:
      mysql:
        condition: service_healthy

  lojademo-react:
    build:
      context: ./projects/lojademo-react
      dockerfile: Dockerfile.production
    restart: always
    environment:
      VITE_API_BASE_URL: https://api-lojademo.rfconsultoria.com.br/api

volumes:
  dbdata:
