services:
  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  lojademo-service:
    build:
      context: ./projects/lojademo-service
      dockerfile: Dockerfile.production
    restart: always
    working_dir: /var/www
    ports:
      - "8081:8081"
    environment:
      APP_ENV: production
      APP_DEBUG: false
      APP_KEY: ${APP_KEY}
      APP_URL: https://api-lojademo.rfconsultoria.com.br
      SANCTUM_STATEFUL_DOMAINS: lojademo.rfconsultoria.com.br,api-lojademo.rfconsultoria.com.br
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - service_storage:/var/www/storage
    command:
      - sh
      - -c
      - |
        mkdir -p storage/framework/{sessions,views,cache} storage/logs &&
        php artisan migrate --force --no-interaction &&
        php artisan config:cache &&
        php artisan route:cache &&
        php artisan view:cache &&
        exec php artisan serve --host=0.0.0.0 --port=8081
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/up"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  lojademo-react:
    build:
      context: ./projects/lojademo-react
      dockerfile: Dockerfile.production
      args:
        VITE_API_BASE_URL: https://api-lojademo.rfconsultoria.com.br/api
    restart: always
    depends_on:
      lojademo-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000', r => { r.resume(); process.exit(r.statusCode === 200 ? 0 : 1); }).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mysql_data:
  service_storage:
